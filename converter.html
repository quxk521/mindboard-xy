<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Converter</title>
    <link rel="stylesheet" href="./src/converter.css" />
    <script defer src="./src/converter.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>Canvas Converter</h1>
            <p>Obsidian Canvas -> MindBoard</p>
          </div>
        </div>
      </header>

      <section class="workspace" id="dropZone">
        <form class="converter-form">
          <div class="field">
            <label for="canvasPath">Canvas 文件</label>
            <div class="path-row">
              <input id="canvasPath" type="text" placeholder="选择 .canvas 文件" spellcheck="false" />
              <button type="button" class="icon-button" id="pickCanvas" title="选择 Canvas 文件">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16V8h-7l-2-3H4z" /></svg>
              </button>
            </div>
          </div>

          <div class="field">
            <label for="vaultPath">Obsidian 库目录</label>
            <div class="path-row">
              <input id="vaultPath" type="text" placeholder="选择 Obsidian 库目录" spellcheck="false" />
              <button type="button" class="icon-button" id="pickVault" title="选择 Obsidian 库目录">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16V8h-7l-2-3H4z" /><path d="M12 12h5" /></svg>
              </button>
            </div>
          </div>

          <div class="field">
            <label for="outputPath">输出文件</label>
            <div class="path-row">
              <input id="outputPath" type="text" placeholder="选择 .mindboard 输出位置" spellcheck="false" />
              <button type="button" class="icon-button" id="pickOutput" title="选择输出文件">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16M12 4v10M8 10l4 4 4-4" /></svg>
              </button>
            </div>
          </div>

          <label class="option-row">
            <input id="embedImages" type="checkbox" checked />
            <span class="checkmark" aria-hidden="true"></span>
            <span>嵌入图片</span>
          </label>

          <div class="actions">
            <button type="button" class="primary-button" id="convertButton" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h13M13 6l6 6-6 6" /></svg>
              <span>转换</span>
            </button>
            <button type="button" class="secondary-button" id="revealButton" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16V8h-7l-2-3H4z" /></svg>
              <span>打开位置</span>
            </button>
          </div>
        </form>

        <aside class="result-panel">
          <div class="result-header">
            <span>结果</span>
            <span class="status-pill idle" id="statusPill">待转换</span>
          </div>
          <div class="stats">
            <div><span id="nodeCount">0</span><label>节点</label></div>
            <div><span id="groupCount">0</span><label>分组</label></div>
            <div><span id="edgeCount">0</span><label>连线</label></div>
          </div>
          <div class="log" id="log"></div>
        </aside>
      </section>
    </main>
  </body>
</html>
